<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoW Arena Points Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #ff9800;
            --border: #30363d;

            --bass: 0;
            --mid: 0;
            --treble: 0;
            --beat: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        #viz-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
            text-shadow:
                0 0 calc(4px + var(--beat) * 30px) rgba(255, 152, 0, calc(0.4 + var(--beat) * 0.6)),
                0 0 calc(20px + var(--bass) * 60px) rgba(255, 152, 0, calc(0.2 + var(--bass) * 0.4));
            letter-spacing: calc(0.02em + var(--beat) * 0.04em);
            transform: scale(calc(1 + var(--beat) * 0.06));
            transition: transform 0.05s ease-out;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
            opacity: calc(0.6 + var(--mid) * 0.4);
        }

        .input-section {
            margin-bottom: 2rem;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input[type="number"] {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1.25rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.05s;
            box-shadow: 0 0 calc(var(--bass) * 25px) rgba(255, 152, 0, calc(var(--bass) * 0.3));
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        input[type="number"]::placeholder {
            color: var(--text-secondary);
        }

        .results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            transition: transform 0.05s ease-out, border-color 0.2s;
            transform: scale(calc(1 + var(--bass) * 0.035));
            box-shadow:
                0 0 calc(var(--bass) * 30px) rgba(255, 152, 0, calc(var(--bass) * 0.35)),
                0 0 calc(var(--beat) * 50px) rgba(255, 200, 80, calc(var(--beat) * 0.25));
            border-color: rgba(255, 152, 0, calc(0.15 + var(--bass) * 0.5));
        }

        .result-card:hover {
            transform: translateY(-2px) scale(calc(1.02 + var(--bass) * 0.035));
            border-color: var(--accent);
        }

        .result-card .bracket {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-card .points {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 calc(var(--treble) * 15px) rgba(255, 152, 0, calc(var(--treble) * 0.5));
        }

        .result-card .points-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        #start-hint {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(13, 17, 23, 0.85);
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.6s ease-out;
            backdrop-filter: blur(4px);
        }

        #start-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #start-hint .hint-content {
            text-align: center;
            animation: pulse-hint 2s ease-in-out infinite;
        }

        #start-hint .hint-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        #start-hint .hint-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        @keyframes pulse-hint {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        @media (prefers-reduced-motion: reduce) {
            h1 {
                text-shadow: 0 0 6px rgba(255, 152, 0, 0.4);
                transform: none;
                letter-spacing: 0.02em;
            }

            .result-card {
                transform: none;
                box-shadow: 0 0 10px rgba(255, 152, 0, 0.1);
                border-color: var(--border);
            }

            .result-card .points { text-shadow: none; }
            input[type="number"] { box-shadow: none; }
            #start-hint .hint-content { animation: none; }
        }

        @media (min-width: 480px) {
            body { padding: 1.5rem; }
            h1 { font-size: 1.75rem; }
            input[type="number"] { font-size: 1.5rem; }
            .result-card .points { font-size: 2.25rem; }
        }

        @media (min-width: 768px) {
            body { padding: 2rem; }
            h1 { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .results { grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
            .result-card { padding: 1.5rem; }
            .result-card .points { font-size: 2.5rem; }
        }

        @media (min-width: 1024px) {
            body { padding: 3rem; }
            header { margin-bottom: 2.5rem; }
            h1 { font-size: 2.5rem; }
            .input-section { margin-bottom: 2.5rem; }
            input[type="number"] { padding: 1rem 1.25rem; font-size: 1.75rem; }
            .results { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
            .result-card { padding: 2rem 1.5rem; }
            .result-card .bracket { font-size: 1rem; }
            .result-card .points { font-size: 2.75rem; }
        }

        @media (min-width: 1200px) {
            .result-card .points { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <canvas id="viz-canvas"></canvas>

    <div id="start-hint">
        <div class="hint-content">
            <div class="hint-icon">🎵</div>
            <div class="hint-text">Cliquez n'importe où pour lancer la musique</div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Arena Points Calculator</h1>
            <p class="subtitle">World of Warcraft - Saison Arena</p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <label for="rating">Votre rating arena</label>
                <input type="number" id="rating" placeholder="Ex: 1500" min="0" max="3000">
            </div>
        </section>

        <section class="results">
            <div class="result-card">
                <div class="bracket">Base</div>
                <div class="points" id="base">0</div>
                <div class="points-label">points</div>
            </div>
            <div class="result-card">
                <div class="bracket">2v2</div>
                <div class="points" id="2v2">0</div>
                <div class="points-label">points</div>
            </div>
            <div class="result-card">
                <div class="bracket">3v3</div>
                <div class="points" id="3v3">0</div>
                <div class="points-label">points</div>
            </div>
            <div class="result-card">
                <div class="bracket">5v5</div>
                <div class="points" id="5v5">0</div>
                <div class="points-label">points</div>
            </div>
        </section>
    </div>

    <audio id="audio-player" src="T.B.C.mp3" loop preload="auto" crossorigin="anonymous"></audio>

    <script>
        /* ================================================================
           COUCHE 1 : AUDIO + ANALYSE DE FREQUENCES
           ================================================================ */
        const audioEl = document.getElementById('audio-player');
        const startHint = document.getElementById('start-hint');
        const root = document.documentElement;

        let audioCtx = null;
        let analyser = null;
        let sourceNode = null;
        let freqData = null;
        let audioStarted = false;

        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const BASS_END   = 8;
        const MID_END    = 48;
        const TREBLE_END = 240;

        function initAudio() {
            if (audioStarted) return;
            audioStarted = true;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            sourceNode = audioCtx.createMediaElementSource(audioEl);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            analyser.smoothingTimeConstant = 0.82;

            sourceNode.connect(analyser);
            analyser.connect(audioCtx.destination);

            freqData = new Uint8Array(analyser.frequencyBinCount);

            audioEl.play().catch(function(err) { console.warn('Lecture audio bloquee:', err); });
        }

        let bassNorm = 0, midNorm = 0, trebleNorm = 0;
        let beatEnergy = 0;

        const ENERGY_HISTORY = 43;
        const energyHistory = new Float32Array(ENERGY_HISTORY);
        let energyIdx = 0;
        let energySum = 0;

        function analyzeAudio() {
            if (!analyser) { bassNorm = midNorm = trebleNorm = beatEnergy * 0.92; return; }

            analyser.getByteFrequencyData(freqData);

            let bassSum = 0, midSum = 0, trebleSum = 0;

            for (let i = 0; i < BASS_END; i++) bassSum += freqData[i];
            for (let i = BASS_END; i < MID_END; i++) midSum += freqData[i];
            for (let i = MID_END; i < TREBLE_END; i++) trebleSum += freqData[i];

            const bassRaw = bassSum / (BASS_END * 255);
            const midRaw = midSum / ((MID_END - BASS_END) * 255);
            const trebleRaw = trebleSum / ((TREBLE_END - MID_END) * 255);

            bassNorm = bassNorm * 0.6 + bassRaw * 0.4;
            midNorm = midNorm * 0.6 + midRaw * 0.4;
            trebleNorm = trebleNorm * 0.6 + trebleRaw * 0.4;

            const instantEnergy = bassRaw;
            energySum -= energyHistory[energyIdx];
            energyHistory[energyIdx] = instantEnergy;
            energySum += instantEnergy;
            energyIdx = (energyIdx + 1) % ENERGY_HISTORY;

            const avgEnergy = energySum / ENERGY_HISTORY;
            const variance = instantEnergy - avgEnergy;

            if (instantEnergy > avgEnergy * 1.35 && instantEnergy > 0.25 && variance > 0.08) {
                beatEnergy = Math.min(1, beatEnergy * 0.5 + 0.7);
            } else {
                beatEnergy *= 0.90;
            }
        }

        /* ================================================================
           COUCHE 2 : CANVAS - FOND + SPECTRE CIRCULAIRE + PARTICULES + STROBE
           ================================================================ */
        const canvas = document.getElementById('viz-canvas');
        const ctx = canvas.getContext('2d');

        let W = 0, H = 0, cx = 0, cy = 0;

        function resizeCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            cx = W / 2;
            cy = H / 2;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const PARTICLE_COUNT = reduceMotion ? 0 : 130;
        const particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2.5 + 0.5,
                hue: 25 + Math.random() * 25,
                life: Math.random()
            });
        }

        const NUM_BARS = 96;
        const barAngles = new Float32Array(NUM_BARS);
        for (let i = 0; i < NUM_BARS; i++) barAngles[i] = (i / NUM_BARS) * Math.PI * 2;

        let strobeAlpha = 0;
        let timeAccum = 0;

        function drawVisualizer(dt) {
            timeAccum += dt;
            ctx.clearRect(0, 0, W, H);

            const energyTotal = (bassNorm + midNorm + trebleNorm) / 3;

            const hueBase = 25 + Math.sin(timeAccum * 0.0003) * 15 + energyTotal * 20;
            const pulseRadius = Math.max(1, 200 + bassNorm * 350);

            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulseRadius);
            grad.addColorStop(0, 'hsla(' + hueBase.toFixed(1) + ', 80%, ' + (12 + bassNorm * 18).toFixed(1) + '%, ' + (0.55 + bassNorm * 0.35).toFixed(3) + ')');
            grad.addColorStop(0.5, 'hsla(' + (hueBase + 15).toFixed(1) + ', 70%, ' + (8 + midNorm * 10).toFixed(1) + '%, ' + (0.3 + midNorm * 0.2).toFixed(3) + ')');
            grad.addColorStop(1, 'rgba(13, 17, 23, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            if (reduceMotion) return;

            const baseRadius = Math.min(W, H) * 0.18;
            const maxBarLen = Math.min(W, H) * 0.22;

            ctx.lineCap = 'round';
            for (let i = 0; i < NUM_BARS; i++) {
                const freqIdx = Math.floor((i / NUM_BARS) * (TREBLE_END * 0.7));
                const amp = freqData ? freqData[freqIdx] / 255 : 0;
                const len = amp * maxBarLen * (0.5 + bassNorm * 0.8);
                const angle = barAngles[i] + timeAccum * 0.00008;

                const x1 = cx + Math.cos(angle) * baseRadius;
                const y1 = cy + Math.sin(angle) * baseRadius;
                const x2 = cx + Math.cos(angle) * (baseRadius + len);
                const y2 = cy + Math.sin(angle) * (baseRadius + len);

                const barHue = hueBase + (i / NUM_BARS) * 40;
                ctx.strokeStyle = 'hsla(' + barHue.toFixed(1) + ', 90%, ' + (50 + amp * 30).toFixed(1) + '%, ' + (0.3 + amp * 0.7).toFixed(3) + ')';
                ctx.lineWidth = 2 + amp * 3;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = particles[i];
                const speedMul = 1 + bassNorm * 4 + beatEnergy * 2;
                p.x += p.vx * speedMul;
                p.y += p.vy * speedMul;

                if (p.x < 0) p.x = W;
                if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H;
                if (p.y > H) p.y = 0;

                const dx = p.x - cx;
                const dy = p.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < baseRadius + 30) {
                    const ang = Math.atan2(dy, dx);
                    p.x = cx + Math.cos(ang) * (baseRadius + 30);
                    p.y = cy + Math.sin(ang) * (baseRadius + 30);
                    p.vx = Math.cos(ang) * (1 + bassNorm * 3);
                    p.vy = Math.sin(ang) * (1 + bassNorm * 3);
                }

                const sz = Math.max(0.1, p.size * (1 + bassNorm * 2 + beatEnergy));
                const alpha = (0.3 + trebleNorm * 0.5) * (0.7 + Math.sin(timeAccum * 0.002 + p.life * 10) * 0.3);

                ctx.fillStyle = 'hsla(' + p.hue.toFixed(1) + ', 90%, 65%, ' + alpha.toFixed(3) + ')';
                ctx.beginPath();
                ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';

            if (beatEnergy > 0.55) {
                strobeAlpha = Math.max(strobeAlpha, beatEnergy * 0.12);
            }
            if (strobeAlpha > 0.01) {
                ctx.fillStyle = 'rgba(255, 240, 200, ' + strobeAlpha.toFixed(3) + ')';
                ctx.fillRect(0, 0, W, H);
                strobeAlpha *= 0.82;
            }
        }

        /* ================================================================
           COUCHE 3 : DOM REACTIF - CSS CUSTOM PROPERTIES
           ================================================================ */
        function updateDOMReactive() {
            root.style.setProperty('--bass', bassNorm.toFixed(3));
            root.style.setProperty('--mid', midNorm.toFixed(3));
            root.style.setProperty('--treble', trebleNorm.toFixed(3));
            root.style.setProperty('--beat', beatEnergy.toFixed(3));
        }

        /* ================================================================
           BOUCLE PRINCIPALE
           ================================================================ */
        let lastTime = performance.now();
        function loop(now) {
            const dt = now - lastTime;
            lastTime = now;

            analyzeAudio();
            drawVisualizer(dt);
            updateDOMReactive();

            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        /* ================================================================
           COUCHE 4 : CONTROLES + ACCESSIBILITE
           ================================================================ */
        function startOnFirstClick() {
            initAudio();
            startHint.classList.add('hidden');
            document.removeEventListener('click', startOnFirstClick);
            document.removeEventListener('touchstart', startOnFirstClick);
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        document.addEventListener('click', startOnFirstClick);
        document.addEventListener('touchstart', startOnFirstClick, { passive: true });

        /* ================================================================
           CALCULATEUR ARENA (logique originale, intacte)
           ================================================================ */
        function arenaAllPoints(r) {
            const numerator = 1651.94 - 475;
            const denominator = 1 + 2500000 * Math.exp(-0.009 * r);
            const p = (numerator / denominator + 475) * 1.5;

            return {
                rating: r,
                base: p,
                "2v2": p * 0.76,
                "3v3": p * 0.88,
                "5v5": p
            };
        }

        const ratingInput = document.getElementById('rating');
        const baseEl = document.getElementById('base');
        const v2El = document.getElementById('2v2');
        const v3El = document.getElementById('3v3');
        const v5El = document.getElementById('5v5');

        function updatePoints() {
            const rating = parseInt(ratingInput.value) || 0;
            const results = arenaAllPoints(rating);

            baseEl.textContent = Math.round(results.base);
            v2El.textContent = Math.round(results['2v2']);
            v3El.textContent = Math.round(results['3v3']);
            v5El.textContent = Math.round(results['5v5']);
        }

        ratingInput.addEventListener('input', updatePoints);
        updatePoints();
    </script>
</body>
</html>
