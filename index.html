<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoW Arena Points Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #ff9800;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .input-section {
            margin-bottom: 2rem;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input[type="number"] {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1.25rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        input[type="number"]::placeholder {
            color: var(--text-secondary);
        }

        .results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .result-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .result-card .bracket {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-card .points {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .result-card .points-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        @media (min-width: 480px) {
            body {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            input[type="number"] {
                font-size: 1.5rem;
            }

            .result-card .points {
                font-size: 2.25rem;
            }
        }

        @media (min-width: 768px) {
            body {
                padding: 2rem;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .results {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.25rem;
            }

            .result-card {
                padding: 1.5rem;
            }

            .result-card .points {
                font-size: 2.5rem;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 3rem;
            }

            header {
                margin-bottom: 2.5rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .input-section {
                margin-bottom: 2.5rem;
            }

            input[type="number"] {
                padding: 1rem 1.25rem;
                font-size: 1.75rem;
            }

            .results {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.5rem;
            }

            .result-card {
                padding: 2rem 1.5rem;
            }

            .result-card .bracket {
                font-size: 1rem;
            }

            .result-card .points {
                font-size: 2.75rem;
            }
        }

        @media (min-width: 1200px) {
            .result-card .points {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Arena Points Calculator</h1>
            <p class="subtitle">World of Warcraft - Saison Arena</p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <label for="rating">Votre rating arena</label>
                <input type="number" id="rating" placeholder="Ex: 1500" min="0" max="3000">
            </div>
        </section>

        <section class="results">
            <div class="result-card">
                <div class="bracket">Base</div>
                <div class="points" id="base">0</div>
                <div class="points-label">points</div>
            </div>
            <div class="result-card">
                <div class="bracket">2v2</div>
                <div class="points" id="2v2">0</div>
                <div class="points-label">points</div>
            </div>
            <div class="result-card">
                <div class="bracket">3v3</div>
                <div class="points" id="3v3">0</div>
                <div class="points-label">points</div>
            </div>
            <div class="result-card">
                <div class="bracket">5v5</div>
                <div class="points" id="5v5">0</div>
                <div class="points-label">points</div>
            </div>
        </section>
    </div>

    <script>
        function arenaAllPoints(r) {
            const numerator = 1651.94 - 475;
            const denominator = 1 + 2500000 * Math.exp(-0.009 * r);
            const p = (numerator / denominator + 475) * 1.5;

            return {
                rating: r,
                base: p,
                "2v2": p * 0.76,
                "3v3": p * 0.88,
                "5v5": p
            };
        }

        const ratingInput = document.getElementById('rating');
        const baseEl = document.getElementById('base');
        const v2El = document.getElementById('2v2');
        const v3El = document.getElementById('3v3');
        const v5El = document.getElementById('5v5');

        function updatePoints() {
            const rating = parseInt(ratingInput.value) || 0;
            const results = arenaAllPoints(rating);

            baseEl.textContent = Math.round(results.base);
            v2El.textContent = Math.round(results['2v2']);
            v3El.textContent = Math.round(results['3v3']);
            v5El.textContent = Math.round(results['5v5']);
        }

        ratingInput.addEventListener('input', updatePoints);

        updatePoints();
    </script>
</body>
</html>
